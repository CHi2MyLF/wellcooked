<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能后厨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#008060',
            secondary: '#FDFCF5',
            accent: '#E67E22',
            dark: '#333333',
            light: '#FDFCF5',
          },
          fontFamily: {
            serif: ['SimSun', 'STSong', 'serif'],
            sans: ['SimHei', 'STHeiti', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .loading-spinner {
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .retro-card {
        background: #FDFCF5;
        border: 1px solid #333333;
        transition: all 0.3s ease;
      }
      .retro-card:hover {
        transform: translateY(-2px);
      }
      .retro-input {
        background: #FDFCF5;
        border: 1px solid #333333;
        transition: all 0.3s ease;
      }
      .retro-input:focus {
        outline: none;
        border-color: #008060;
      }
      .retro-button {
        background: #008060;
        color: white;
        border: 1px solid #333333;
        transition: all 0.3s ease;
      }
      .retro-button:hover {
        background: #00664d;
      }
      .step-card {
        background: #FDFCF5;
        border: 1px solid #333333;
        transition: all 0.3s ease;
      }
      .step-card:hover {
        transform: translateY(-2px);
      }
      .step-number {
        border: 2px solid #008060;
        background: #FDFCF5;
        color: #008060;
      }
      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      /* 烹饪动画 */
      .cooking-animation {
        position: relative;
        width: 80px;
        height: 80px;
      }
      
      .pan {
        position: relative;
        width: 80px;
        height: 35px;
        background: linear-gradient(135deg, #6b7280 0%, #374151 100%);
        border-radius: 20px 20px 5px 5px;
        animation: panShake 1s ease-in-out infinite;
        margin-top: 20px;
      }
      
      .pan::before {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
        border-radius: 0 0 5px 5px;
      }
      
      .pan-handle {
        position: absolute;
        right: -25px;
        top: 10px;
        width: 25px;
        height: 12px;
        background: linear-gradient(90deg, #6b7280 0%, #374151 100%);
        border-radius: 0 5px 5px 0;
      }
      
      .food {
        position: absolute;
        left: 10px;
        top: -15px;
        width: 60px;
        height: 22px;
        background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        border-radius: 5px;
        animation: foodFlip 2s ease-in-out infinite;
      }
      
      .steam {
        position: absolute;
        left: 20px;
        top: -20px;
        width: 40px;
        height: 40px;
      }
      
      .steam-line {
        position: absolute;
        width: 4px;
        height: 15px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 2px;
        animation: steamRise 1.5s ease-in-out infinite;
      }
      
      .steam-line:nth-child(1) {
        left: 5px;
        animation-delay: 0s;
      }
      
      .steam-line:nth-child(2) {
        left: 13px;
        animation-delay: 0.3s;
      }
      
      .steam-line:nth-child(3) {
        left: 21px;
        animation-delay: 0.6s;
      }
      
      @keyframes panShake {
        0%, 100% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(1deg);
        }
        75% {
          transform: rotate(-1deg);
        }
      }
      
      @keyframes foodFlip {
        0%, 100% {
          transform: rotate(0deg) translateY(0);
        }
        50% {
          transform: rotate(180deg) translateY(-5px);
        }
      }
      
      @keyframes steamRise {
        0% {
          transform: translateY(0) scale(0.8);
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          transform: translateY(-20px) scale(1.2);
          opacity: 0;
        }
      }
    }
  </style>
</head>
<body class="bg-secondary min-h-screen p-4 md:p-8">
  <div class="min-h-screen flex flex-col max-w-[600px] mx-auto relative z-10 pb-20">
    <!-- 个人中心头像 -->
    <div class="absolute top-4 left-4 z-30">
      <div id="userAvatar" class="w-10 h-10 rounded-full border-2 border-dark flex items-center justify-center cursor-pointer hover:scale-110 transition-transform duration-300">
        <i class="fa fa-book text-primary text-xl"></i>
      </div>
    </div>
    
    <!-- 侧边栏 -->
    <div id="sidebar" class="fixed top-0 left-0 w-64 h-full bg-secondary border-r-2 border-dark z-40 transform -translate-x-full transition-transform duration-300 ease-in-out">
      <div class="p-4">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xl font-bold font-serif">个人中心</h3>
          <button id="closeSidebar" class="text-dark hover:text-primary">
            <i class="fa fa-times text-xl"></i>
          </button>
        </div>
        <div class="mb-6">
          <h4 class="text-lg font-medium font-serif mb-3">最近记录</h4>
          <div id="recentRecipes" class="space-y-2">
            <!-- 最近记录将通过 JavaScript 动态添加 -->
          </div>
        </div>
      </div>
    </div>
    
    <!-- 遮罩层 -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden transition-opacity duration-300"></div>
    
    <div class="absolute top-4 left-16 z-20">
      <button id="backButton" class="hidden flex items-center justify-center w-10 h-10 hover:bg-gray-100 rounded-full transition-all duration-300">
        <i class="fa fa-arrow-left text-primary text-xl"></i>
      </button>
    </div>
    
    <!-- 标题 -->
    <header class="text-center my-8">
      <h1 class="text-4xl font-bold text-dark font-serif mb-2">智能后厨</h1>
      <p class="text-gray-600 font-sans">根据食材生成美味菜谱</p>
    </header>

    <!-- 食材输入区域（置顶） -->
    <div class="mb-8" id="searchSection">
      <div class="flex flex-col md:flex-row gap-4 mb-6">
        <div class="relative flex-1">
          <input
            type="text"
            id="ingredients"
            placeholder="输入食材，例如：西红柿、鸡蛋"
            class="w-full retro-input rounded-md px-4 py-3 pr-12"
          />
          <button
            id="voiceBtn"
            class="absolute right-2 top-1/2 transform -translate-y-1/2 flex items-center justify-center w-8 h-8 text-primary hover:text-primary/80 transition-colors"
          >
            <i class="fa fa-microphone"></i>
          </button>
        </div>
        <button
          id="generateBtn"
          class="flex items-center justify-center gap-2 px-4 py-3 rounded-md retro-button whitespace-nowrap"
        >
          <span id="generateText">搜索</span>
          <div id="loading" class="hidden flex flex-col items-center justify-center gap-3">
            <div class="cooking-animation">
              <div class="pan">
                <div class="pan-handle"></div>
                <div class="food"></div>
                <div class="steam">
                  <div class="steam-line"></div>
                  <div class="steam-line"></div>
                  <div class="steam-line"></div>
                </div>
              </div>
            </div>
            <p id="loadingText" class="text-sm font-medium">搜索中...</p>
          </div>
        </button>
      </div>
      
      <!-- 分类标签 -->
      <div class="mb-6" id="categorySection">
        <div class="flex flex-wrap gap-3">
          <span class="px-4 py-2 border border-dark rounded-full text-sm cursor-pointer hover:bg-primary hover:text-white hover:border-primary transition-colors" data-category="all">全部</span>
          <span class="px-4 py-2 border border-dark rounded-full text-sm cursor-pointer hover:bg-primary hover:text-white hover:border-primary transition-colors" data-category="popular">热门菜谱</span>
          <span class="px-4 py-2 border border-dark rounded-full text-sm cursor-pointer hover:bg-primary hover:text-white hover:border-primary transition-colors" data-category="quick">快手菜</span>
          <span class="px-4 py-2 border border-dark rounded-full text-sm cursor-pointer hover:bg-primary hover:text-white hover:border-primary transition-colors" data-category="home">家常菜</span>
          <span class="px-4 py-2 border border-dark rounded-full text-sm cursor-pointer hover:bg-primary hover:text-white hover:border-primary transition-colors" data-category="vegetarian">素食</span>
          <span class="px-4 py-2 border border-dark rounded-full text-sm cursor-pointer hover:bg-primary hover:text-white hover:border-primary transition-colors" data-category="meat">肉类</span>
        </div>
      </div>
    </div>
    
    <!-- 今日推荐 -->
    <div class="mb-8" id="todayRecommendation">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold text-dark font-serif">今日推荐</h3>
        <span class="text-sm text-primary cursor-pointer hover:underline" id="viewMoreBtn">查看更多</span>
      </div>
      <div class="retro-card rounded-lg p-4 mb-4 cursor-pointer transition-all duration-300 hover:shadow-md" id="recommendationCard">
        <div class="flex flex-col md:flex-row gap-4">
          <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=chinese%20cuisine%20special%20dish%2C%20minimalist%20style%2C%20retro%20aesthetic&image_size=landscape_4_3" alt="今日推荐" class="w-full md:w-1/3 h-40 object-cover rounded-md border border-dark" />
          <div class="flex-1">
            <h4 class="font-serif font-bold text-lg mb-2">红烧肉</h4>
            <p class="text-sm text-gray-600 mb-3">红烧肉是一道经典的中式菜肴，肥而不腻，入口即化，是很多人喜爱的家常菜。</p>
            <div class="flex gap-2">
              <span class="px-2 py-1 bg-primary text-white text-xs rounded">热门</span>
              <span class="px-2 py-1 border border-dark text-xs rounded">中等难度</span>
              <span class="px-2 py-1 border border-dark text-xs rounded">45分钟</span>
            </div>
          </div>
        </div>
      </div>
    </div>



    <!-- 错误状态 -->
    <div id="errorState" class="hidden retro-card rounded-lg p-8 mb-8 text-center">
      <div class="border-2 border-red-500 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-6">
        <i class="fa fa-exclamation-triangle text-red-500 text-2xl"></i>
      </div>
      <h3 class="text-xl font-medium mb-2 font-serif">输入错误</h3>
      <p id="errorMessage" class="text-gray-600 font-sans">请输入合适的食材</p>
    </div>

    <!-- 菜谱状态 -->
    <div id="recipe" class="hidden retro-card rounded-lg p-6 mb-8 transition-all duration-500">
      <h2 id="recipeName" class="text-2xl font-bold text-primary mb-4 font-serif"></h2>
      <div id="statusBar" class="grid grid-cols-2 gap-4 mb-6">
        <div class="border border-dark rounded-md p-3 flex items-center gap-2">
          <i class="fa fa-fire text-primary"></i>
          <div>
            <p class="text-sm text-gray-600 font-sans">难度等级</p>
            <p id="recipeDifficulty" class="font-medium font-sans"></p>
          </div>
        </div>
        <div class="border border-dark rounded-md p-3 flex items-center gap-2">
          <i class="fa fa-clock-o text-primary"></i>
          <div>
            <p class="text-sm text-gray-600 font-sans">烹饪耗时</p>
            <p id="recipeTime" class="font-medium font-sans"></p>
          </div>
        </div>
      </div>
      <div class="mb-6">
        <h3 class="text-lg font-medium mb-3 font-serif">详细步骤</h3>
        <div id="recipeSteps" class="space-y-4">
        </div>
      </div>
      <div id="recipeTipsContainer" class="hidden">
        <h3 class="text-lg font-medium mb-3 font-serif">小贴士</h3>
        <ul id="recipeTips" class="list-disc list-inside space-y-2 font-sans">
        </ul>
      </div>
      
      <!-- 想做/做过按钮 -->
      <div class="mt-6 flex gap-4">
        <button id="todoBtn" class="flex-1 py-3 border-2 border-dark rounded-md hover:bg-primary hover:text-white hover:border-primary transition-colors">
          <i class="fa fa-bookmark mr-2"></i> 想做
        </button>
        <button id="doneBtn" class="flex-1 py-3 border-2 border-dark rounded-md hover:bg-primary hover:text-white hover:border-primary transition-colors">
          <i class="fa fa-check mr-2"></i> 做过
        </button>
      </div>
    </div>

    <!-- 每日精选食材推荐区（置底） -->
    <div class="mt-auto mb-8">
      <h3 class="text-xl font-bold text-dark mb-4 font-serif">每日精选食材</h3>
      <div class="grid grid-cols-2 gap-4" id="recommendedRecipes">
        <!-- 推荐菜品将通过 JavaScript 动态添加 -->
      </div>
    </div>

    <footer class="mt-auto py-6 text-center text-gray-500 text-sm font-sans">
      <p>2026 @CHi2MyLF</p>
    </footer>
    
    <!-- 底部固定导航栏 -->
    <div class="fixed bottom-0 left-0 right-0 bg-secondary border-t-2 border-dark z-50 max-w-[600px] mx-auto">
      <div class="flex justify-around items-center h-16">
        <button id="navHome" class="flex flex-col items-center justify-center px-4 py-2 text-primary">
          <i class="fa fa-home text-xl"></i>
          <span class="text-xs mt-1">首页</span>
        </button>
        <button id="navCommunity" class="flex flex-col items-center justify-center px-4 py-2 text-gray-600">
          <i class="fa fa-users text-xl"></i>
          <span class="text-xs mt-1">社区</span>
        </button>
        <button id="navMy" class="flex flex-col items-center justify-center px-4 py-2 text-gray-600">
          <i class="fa fa-user text-xl"></i>
          <span class="text-xs mt-1">我的</span>
        </button>
      </div>
    </div>
  </div>
  
  <!-- Toast 提示 -->
  <div id="toast" class="fixed top-1/4 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-dark/80 text-white px-6 py-3 rounded-lg z-50 opacity-0 transition-opacity duration-300 pointer-events-none">
    <p id="toastMessage" class="text-center font-sans"></p>
  </div>
  
  <!-- 社区提示模态框 -->
  <div id="communityModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
    <div class="retro-card rounded-lg p-8 max-w-md mx-4 text-center">
      <h3 class="text-xl font-bold text-dark font-serif mb-4">社区功能</h3>
      <p class="text-gray-600 font-sans mb-6">社区功能暂未开放，敬请期待</p>
      <button id="closeCommunityModal" class="px-6 py-2 bg-primary text-white rounded-md hover:bg-primary/80 transition-colors">
        确定
      </button>
    </div>
  </div>
  
  <!-- 我的页面 -->
  <div id="myPage" class="fixed inset-0 bg-secondary z-50 hidden">
    <div class="max-w-[600px] mx-auto h-full flex flex-col">
      <div class="p-4 border-b-2 border-dark flex items-center justify-between">
        <h3 class="text-xl font-bold text-dark font-serif">我的菜谱</h3>
        <button id="closeMyPage" class="text-dark hover:text-primary">
          <i class="fa fa-times text-xl"></i>
        </button>
      </div>
      <div class="flex-1 p-4 overflow-y-auto">
        <div class="mb-6">
          <h4 class="text-lg font-medium text-dark font-serif mb-3">想做的菜谱</h4>
          <div id="todoRecipes" class="space-y-4">
            <!-- 想做的菜谱将通过 JavaScript 动态添加 -->
          </div>
        </div>
        <div class="mb-6">
          <h4 class="text-lg font-medium text-dark font-serif mb-3">做过的菜谱</h4>
          <div id="doneRecipes" class="space-y-4">
            <!-- 做过的菜谱将通过 JavaScript 动态添加 -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 语音识别功能
    const voiceBtn = document.getElementById('voiceBtn');
    const voiceStatus = document.getElementById('voiceStatus');
    const ingredientsInput = document.getElementById('ingredients');
    const generateBtn = document.getElementById('generateBtn');
    const generateText = document.getElementById('generateText');
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const recipe = document.getElementById('recipe');
    const recipeName = document.getElementById('recipeName');
    const recipeDifficulty = document.getElementById('recipeDifficulty');
    const recipeTime = document.getElementById('recipeTime');
    const recipeSteps = document.getElementById('recipeSteps');
    const recipeTipsContainer = document.getElementById('recipeTipsContainer');
    const recipeTips = document.getElementById('recipeTips');
    const errorState = document.getElementById('errorState');
    const errorMessage = document.getElementById('errorMessage');
    const statusBar = document.getElementById('statusBar');
    const backButton = document.getElementById('backButton');
    const recommendedRecipes = document.getElementById('recommendedRecipes');
    
    // 初始隐藏返回按钮
    backButton.classList.add('hidden');
    
    // 侧边栏交互
    const userAvatar = document.getElementById('userAvatar');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const closeSidebar = document.getElementById('closeSidebar');
    const recentRecipes = document.getElementById('recentRecipes');
    
    // 本地存储相关
    const STORAGE_KEY = 'smart-kitchen-recipes';
    const TODO_RECIPES_KEY = 'smart-kitchen-todo-recipes';
    const DONE_RECIPES_KEY = 'smart-kitchen-done-recipes';
    
    // 从本地存储读取最近记录
    function getRecentRecipes() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        return stored ? JSON.parse(stored) : [];
      } catch (error) {
        console.error('读取本地存储失败:', error);
        return [];
      }
    }
    
    // 保存最近记录到本地存储
    function saveRecentRecipe(recipe) {
      try {
        let recipes = getRecentRecipes();
        
        // 检查是否重复，避免重复记录
        const isDuplicate = recipes.some(r => r.name === recipe.name);
        if (isDuplicate) {
          // 如果重复，移除旧记录
          recipes = recipes.filter(r => r.name !== recipe.name);
        }
        
        // 添加新记录到开头
        recipes.unshift({
          ...recipe,
          timestamp: new Date().toISOString()
        });
        
        // 保持最多10条记录
        if (recipes.length > 10) {
          recipes = recipes.slice(0, 10);
        }
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes));
        renderRecentRecipes();
      } catch (error) {
        console.error('保存本地存储失败:', error);
      }
    }
    
    // 从本地存储读取想做的菜谱
    function getTodoRecipes() {
      try {
        const stored = localStorage.getItem(TODO_RECIPES_KEY);
        return stored ? JSON.parse(stored) : [];
      } catch (error) {
        console.error('读取本地存储失败:', error);
        return [];
      }
    }
    
    // 保存想做的菜谱到本地存储
    function saveTodoRecipe(recipe) {
      try {
        let recipes = getTodoRecipes();
        
        // 检查是否重复，避免重复记录
        const isDuplicate = recipes.some(r => r.name === recipe.name);
        if (!isDuplicate) {
          // 添加新记录到开头
          recipes.unshift({
            ...recipe,
            timestamp: new Date().toISOString()
          });
          
          localStorage.setItem(TODO_RECIPES_KEY, JSON.stringify(recipes));
        }
      } catch (error) {
        console.error('保存本地存储失败:', error);
      }
    }
    
    // 从本地存储读取做过的菜谱
    function getDoneRecipes() {
      try {
        const stored = localStorage.getItem(DONE_RECIPES_KEY);
        return stored ? JSON.parse(stored) : [];
      } catch (error) {
        console.error('读取本地存储失败:', error);
        return [];
      }
    }
    
    // 保存做过的菜谱到本地存储
    function saveDoneRecipe(recipe) {
      try {
        let recipes = getDoneRecipes();
        
        // 检查是否重复，避免重复记录
        const isDuplicate = recipes.some(r => r.name === recipe.name);
        if (!isDuplicate) {
          // 添加新记录到开头
          recipes.unshift({
            ...recipe,
            timestamp: new Date().toISOString()
          });
          
          localStorage.setItem(DONE_RECIPES_KEY, JSON.stringify(recipes));
        }
      } catch (error) {
        console.error('保存本地存储失败:', error);
      }
    }
    
    // 打开侧边栏
    userAvatar.addEventListener('click', () => {
      renderRecentRecipes();
      sidebar.classList.remove('-translate-x-full');
      sidebarOverlay.classList.remove('hidden');
    });
    
    // 关闭侧边栏
    function closeSidebarFunc() {
      sidebar.classList.add('-translate-x-full');
      sidebarOverlay.classList.add('hidden');
    }
    
    closeSidebar.addEventListener('click', closeSidebarFunc);
    sidebarOverlay.addEventListener('click', closeSidebarFunc);
    
    // 渲染最近记录
    function renderRecentRecipes() {
      const recipes = getRecentRecipes();
      recentRecipes.innerHTML = '';
      
      if (recipes.length === 0) {
        recentRecipes.innerHTML = '<p class="text-gray-500 text-sm">暂无最近记录</p>';
        return;
      }

    // 根据分类过滤菜谱
    function filterRecipesByCategory(category) {
      recommendedRecipes.innerHTML = '';
      
      // 模拟分类过滤逻辑
      const filteredRecipes = category === 'all' ? predefinedRecipes : predefinedRecipes.filter(recipe => {
        if (category === 'popular') return recipe.id === 1 || recipe.id === 6; // 西红柿炒蛋和可乐鸡翅是热门
        if (category === 'quick') return recipe.cookingTime.includes('15分钟'); // 快手菜
        if (category === 'home') return recipe.name === '西红柿炒蛋' || recipe.name === '麻婆豆腐' || recipe.name === '酸辣土豆丝'; // 家常菜
        if (category === 'vegetarian') return recipe.name === '蒜蓉西兰花' || recipe.name === '酸辣土豆丝'; // 素食
        if (category === 'meat') return recipe.name === '宫保鸡丁' || recipe.name === '糖醋排骨' || recipe.name === '可乐鸡翅'; // 肉类
        return true;
      });
      
      // 随机排序过滤后的菜谱
      const shuffledFilteredRecipes = [...filteredRecipes].sort(() => Math.random() - 0.5);
      shuffledFilteredRecipes.forEach((recipe, index) => {
        // 固定卡片高度，确保一致性
        const cardHeight = 300;
        
        const recipeCard = document.createElement('div');
        recipeCard.className = 'retro-card rounded-lg overflow-hidden cursor-pointer transition-all duration-300';
        recipeCard.style.height = `${cardHeight}px`;
        recipeCard.innerHTML = `
          <img src="${recipe.image}" alt="${recipe.name}" class="w-full h-48 object-cover border-b border-dark">
          <div class="p-4 flex flex-col justify-between h-[calc(100%-120px)]">
            <div>
              <div class="flex gap-2 mb-2">
                <span class="px-2 py-1 bg-primary text-white text-xs rounded">${recipe.difficulty}</span>
                <span class="px-2 py-1 border border-dark text-xs rounded">${recipe.cookingTime}</span>
              </div>
              <h4 class="font-serif font-bold text-lg mb-2">${recipe.name}</h4>
              <p class="text-sm text-gray-600 font-sans mb-3">${recipe.ingredients}</p>
            </div>
            <div class="flex items-center justify-between">
              <div class="flex items-center">
                ${Array(5).fill(0).map((_, i) => `<i class="fa fa-star ${i < 4 ? 'text-primary' : 'text-gray-300'}"></i>`).join('')}
              </div>
              <span class="text-xs text-gray-500">查看详情</span>
            </div>
          </div>
        `;
        
        // 添加点击事件
        recipeCard.addEventListener('click', () => {
          showPredefinedRecipe(recipe);
        });
        
        recommendedRecipes.appendChild(recipeCard);
      });
    }

    generateBtn.addEventListener('click', async () => {
      const ingredients = ingredientsInput.value.trim();
      if (!ingredients) {
        alert('请输入食材');
        return;
      }
      
      console.log('输入内容:', ingredients);
      
      // 输入验证：过滤不适当的输入
      const inappropriateWords = ['屎', '尿', '粪便', '垃圾', '毒药'];
      let hasInappropriateWord = false;
      
      for (let i = 0; i < inappropriateWords.length; i++) {
        if (ingredients.includes(inappropriateWords[i])) {
          hasInappropriateWord = true;
          break;
        }
      }
      
      console.log('是否包含不适当词汇:', hasInappropriateWord);
      
      // 直接检查输入是否为"屎"
      if (hasInappropriateWord || ingredients === '屎') {
        console.log('显示错误提示');
        // 显示错误状态
        hideAllStates();
        // 隐藏推荐内容
        document.getElementById('todayRecommendation').classList.add('hidden');
        document.querySelector('.mt-auto.mb-8').classList.add('hidden');
        errorState.classList.remove('hidden');
        errorMessage.textContent = '请输入合适的食材';
        backButton.classList.remove('hidden');
        generateText.classList.remove('hidden');
        loading.classList.add('hidden');
        return;
      }

      // 检查是否正在加载
      if (isLoading) {
        return;
      }
      
      // 设置加载状态
      isLoading = true;
      
      // 禁用生成按钮
      generateBtn.disabled = true;
      generateBtn.classList.add('opacity-70', 'cursor-not-allowed');
      
      // 显示加载状态
      generateText.classList.remove('hidden');

      // 创建并显示加载动画框
      const loadingBox = document.createElement('div');
      loadingBox.id = 'loadingBox';
      loadingBox.className = 'mt-6 p-6 bg-primary/10 border-2 border-primary rounded-lg flex flex-col items-center justify-center gap-4';
      loadingBox.style.cursor = 'pointer';
      loadingBox.innerHTML = `
        <div class="cooking-animation">
          <div class="pan">
            <div class="pan-handle"></div>
            <div class="food"></div>
            <div class="steam">
              <div class="steam-line"></div>
              <div class="steam-line"></div>
              <div class="steam-line"></div>
            </div>
          </div>
        </div>
        <p id="loadingBoxText" class="text-sm font-medium">搜索中...</p>
      `;
      
      // 添加点击互动效果
      loadingBox.addEventListener('click', function() {
        const cookingAnimation = this.querySelector('.cooking-animation');
        if (cookingAnimation) {
          cookingAnimation.style.transform = 'scale(1.1)';
          setTimeout(() => {
            cookingAnimation.style.transform = 'scale(1)';
          }, 200);
        }
      });
      
      // 将加载框插入到搜索区域下方
      const searchSection = document.getElementById('searchSection');
      searchSection.appendChild(loadingBox);
      
      hideAllStates();
      // 隐藏推荐内容
      document.getElementById('todayRecommendation').classList.add('hidden');
      document.querySelector('.mt-auto.mb-8').classList.add('hidden');
      // 隐藏搜索辅助元素，只保留返回按钮和搜索框
      document.getElementById('categorySection').classList.add('hidden');
      // 隐藏菜谱框，只显示加载动画
      recipe.classList.add('hidden');
      backButton.classList.remove('hidden');
      
      // 开始随机滚动加载文案
      let currentTextIndex = 0;
      const loadingBoxText = document.getElementById('loadingBoxText');
      if (loadingBoxText) {
        loadingBoxText.textContent = loadingTexts[0];
      }
      loadingTimer = setInterval(() => {
        currentTextIndex = (currentTextIndex + 1) % loadingTexts.length;
        if (loadingBoxText) {
          loadingBoxText.textContent = loadingTexts[currentTextIndex];
        }
      }, 1500);

      try {
        const controller = new AbortController();
        const signal = controller.signal;
        
        // 为返回按钮添加取消功能
        backButton.onclick = () => {
          controller.abort();
          clearInterval(loadingTimer);
          
          // 移除加载框
          const loadingBox = document.getElementById('loadingBox');
          if (loadingBox) {
            loadingBox.remove();
          }
          
          // 启用生成按钮
          generateBtn.disabled = false;
          generateBtn.classList.remove('opacity-70', 'cursor-not-allowed');
          
          // 重置加载状态
          isLoading = false;
          
          // 添加淡出效果
          recipe.classList.add('opacity-0');
          errorState.classList.add('opacity-0');
          backButton.classList.add('opacity-0');
          
          // 等待动画完成后重置状态
        setTimeout(() => {
          // 清空菜谱数据
          recipeName.textContent = '';
          recipeDifficulty.textContent = '';
          recipeTime.textContent = '';
          recipeSteps.innerHTML = '';
          recipeTips.innerHTML = '';
          recipeTipsContainer.classList.add('hidden');
          
          // 隐藏菜谱状态
          hideAllStates();
          
          // 重置输入框
          ingredientsInput.value = '';
          
          // 重置按钮状态
          generateText.classList.remove('hidden');
          loading.classList.add('hidden');
          
          // 显示想做/做过按钮
          document.getElementById('todoBtn').classList.remove('hidden');
          document.getElementById('doneBtn').classList.remove('hidden');
          
          // 移除淡出效果，为下次显示做准备
          recipe.classList.remove('opacity-0');
          errorState.classList.remove('opacity-0');
          backButton.classList.remove('opacity-0');
        }, 300);
        };
        
        const response = await fetch('http://localhost:3001/api/generate-recipe', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            ingredients: ingredients
          }),
          signal: signal
        });

        const data = await response.json();

        try {
          // 检查响应格式
          if (!data.choices || !data.choices[0] || !data.choices[0].message || !data.choices[0].message.content) {
            throw new Error('API响应格式错误');
          }
          
          const content = data.choices[0].message.content;
          // 预处理内容，移除可能的前缀和清理格式
          let processedContent = content.trim();
          // 移除开头的数字和点号，如 "1."
          processedContent = processedContent.replace(/^\d+\./, '');
          // 移除可能的额外引号
          processedContent = processedContent.replace(/^["']|['"]$/g, '');
          // 尝试解析 JSON 格式
          const recipeData = JSON.parse(processedContent);
          
          // 检查是否存在错误信息
          if (recipeData.error) {
            // 显示错误状态
            hideAllStates();
            errorState.classList.remove('hidden');
            errorMessage.textContent = recipeData.error;
            backButton.classList.remove('hidden');
            return;
          }
          
          // 填充菜谱信息
          recipeName.textContent = recipeData.name || 'AI 生成菜谱';
          recipeDifficulty.textContent = recipeData.difficulty || '未知';
          recipeTime.textContent = recipeData.cookingTime || '未知';
          
          // 条件渲染状态栏
          if (recipeData.difficulty && recipeData.cookingTime) {
            statusBar.classList.remove('hidden');
          } else {
            statusBar.classList.add('hidden');
          }
          
          // 填充步骤
          recipeSteps.innerHTML = '';
          if (Array.isArray(recipeData.steps)) {
            recipeData.steps.forEach((step, index) => {
              const stepCard = document.createElement('div');
              stepCard.className = 'step-card bg-white rounded-md p-4 border border-gray-200 shadow-sm';
              stepCard.innerHTML = `
                <div class="flex items-start gap-3">
                  <div class="step-number rounded-full w-8 h-8 flex items-center justify-center flex-shrink-0 font-medium">
                    ${index + 1}
                  </div>
                  <p class="text-gray-700">${step}</p>
                </div>
              `;
              recipeSteps.appendChild(stepCard);
            });
          } else {
            const stepCard = document.createElement('div');
            stepCard.className = 'step-card bg-white rounded-md p-4 border border-gray-200 shadow-sm';
            stepCard.innerHTML = `
              <div class="flex items-start gap-3">
                <div class="step-number rounded-full w-8 h-8 flex items-center justify-center flex-shrink-0 font-medium">
                  1
                </div>
                <p class="text-gray-700">步骤信息缺失</p>
              </div>
            `;
            recipeSteps.appendChild(stepCard);
          }

          // 填充小贴士
          recipeTips.innerHTML = '';
          if (Array.isArray(recipeData.tips) && recipeData.tips.length > 0) {
            recipeTipsContainer.classList.remove('hidden');
            recipeData.tips.forEach(tip => {
              const li = document.createElement('li');
              li.className = 'text-gray-700';
              li.textContent = tip;
              recipeTips.appendChild(li);
            });
          } else {
            recipeTipsContainer.classList.add('hidden');
          }
          
          // 保存到本地存储
          saveRecentRecipe({
            name: recipeData.name || 'AI 生成菜谱',
            difficulty: recipeData.difficulty || '未知',
            cookingTime: recipeData.cookingTime || '未知',
            steps: recipeData.steps || [],
            tips: recipeData.tips || []
          });
        } catch (error) {
          console.error('JSON 解析失败:', error);
          
          // 清理文本中的星号和井号
          let cleanedContent = content.replace(/[*#]/g, '');
          
          // 尝试从文本中提取菜名
          const nameMatch = cleanedContent.match(/菜名：(.*?)难度等级/);
          if (nameMatch) {
            recipeName.textContent = nameMatch[1].trim();
          } else {
            recipeName.textContent = 'AI 生成菜谱';
          }
          
          // 尝试从文本中提取难度等级
          const difficultyMatch = cleanedContent.match(/难度等级：(.*?)烹饪耗时/);
          if (difficultyMatch) {
            recipeDifficulty.textContent = difficultyMatch[1].trim();
          } else {
            recipeDifficulty.textContent = '未知';
          }
          
          // 尝试从文本中提取烹饪耗时
          const timeMatch = cleanedContent.match(/烹饪耗时：(.*?)详细步骤/);
          if (timeMatch) {
            recipeTime.textContent = timeMatch[1].trim();
          } else {
            recipeTime.textContent = '未知';
          }
          
          // 条件渲染状态栏
          if (recipeDifficulty.textContent && recipeDifficulty.textContent !== '未知' && recipeTime.textContent && recipeTime.textContent !== '未知') {
            statusBar.classList.remove('hidden');
          } else {
            statusBar.classList.add('hidden');
          }
          
          // 尝试从文本中提取详细步骤
          const stepsMatch = cleanedContent.match(/详细步骤：(.*?)小贴士/);
          if (stepsMatch) {
            let stepsText = stepsMatch[1].trim();
            // 按步骤编号分割
            const stepsArray = stepsText.split(/\d+\./).filter(step => step.trim());
            recipeSteps.innerHTML = '';
            stepsArray.forEach((step, index) => {
              const stepCard = document.createElement('div');
              stepCard.className = 'step-card bg-white rounded-md p-4 border border-gray-200 shadow-sm';
              stepCard.innerHTML = `
                <div class="flex items-start gap-3">
                  <div class="step-number rounded-full w-8 h-8 flex items-center justify-center flex-shrink-0 font-medium">
                    ${index + 1}
                  </div>
                  <p class="text-gray-700">${step.trim()}</p>
                </div>
              `;
              recipeSteps.appendChild(stepCard);
            });
          } else {
            recipeSteps.innerHTML = '';
            const stepCard = document.createElement('div');
            stepCard.className = 'step-card bg-white rounded-md p-4 border border-gray-200 shadow-sm';
            stepCard.innerHTML = `
              <div class="flex items-start gap-3">
                <div class="step-number rounded-full w-8 h-8 flex items-center justify-center flex-shrink-0 font-medium">
                  1
                </div>
                <p class="text-gray-700">${cleanedContent}</p>
              </div>
            `;
            recipeSteps.appendChild(stepCard);
          }
          
          // 尝试从文本中提取小贴士
          const tipsMatch = cleanedContent.match(/小贴士：(.*)/);
          let tipsArray = [];
          if (tipsMatch) {
            let tipsText = tipsMatch[1].trim();
            // 按项目分割
            tipsArray = tipsText.split(/\d+\./).filter(tip => tip.trim());
            if (tipsArray.length > 0) {
              recipeTipsContainer.classList.remove('hidden');
              recipeTips.innerHTML = '';
              tipsArray.forEach(tip => {
                const li = document.createElement('li');
                li.className = 'text-gray-700';
                li.textContent = tip.trim();
                recipeTips.appendChild(li);
              });
            } else {
              recipeTipsContainer.classList.add('hidden');
            }
          } else {
            recipeTipsContainer.classList.add('hidden');
          }
          
          // 保存到本地存储
          saveRecentRecipe({
            name: recipeName.textContent,
            difficulty: recipeDifficulty.textContent,
            cookingTime: recipeTime.textContent,
            steps: Array.from(recipeSteps.children).map(stepCard => {
              const p = stepCard.querySelector('p');
              return p ? p.textContent : '';
            }).filter(Boolean),
            tips: tipsArray
          });
        }

        // 显示菜谱
        recipe.classList.remove('hidden');
        recipe.classList.add('opacity-0');
        recipe.classList.add('transition-opacity');
        recipe.classList.add('duration-500');
        setTimeout(() => {
          recipe.classList.remove('opacity-0');

          // 清除加载定时器
          clearInterval(loadingTimer);
          // 隐藏加载状态
          generateText.classList.remove('hidden');
          loading.classList.add('hidden');
          
          // 移除加载框
          const loadingBox = document.getElementById('loadingBox');
          if (loadingBox) {
            loadingBox.remove();
          }
          
          // 启用生成按钮
          generateBtn.disabled = false;
          generateBtn.classList.remove('opacity-70', 'cursor-not-allowed');
          
          // 重置加载状态
          isLoading = false;
        }
    });

    // 返回按钮点击事件
    backButton.addEventListener('click', () => {
      // 添加淡出效果
      recipe.classList.add('opacity-0');
      errorState.classList.add('opacity-0');
      backButton.classList.add('opacity-0');
      
      // 等待动画完成后重置状态
      setTimeout(() => {
        // 清空菜谱数据
        recipeName.textContent = '';
        recipeDifficulty.textContent = '';
        recipeTime.textContent = '';
        recipeSteps.innerHTML = '';
        recipeTips.innerHTML = '';
        recipeTipsContainer.classList.add('hidden');
        
        // 隐藏菜谱状态
        hideAllStates();
        
        // 重新显示推荐内容
        document.getElementById('todayRecommendation').classList.remove('hidden');
        document.querySelector('.mt-auto.mb-8').classList.remove('hidden');
        
        // 重新显示搜索辅助元素
        document.getElementById('categorySection').classList.remove('hidden');
        
        // 重置输入框
        ingredientsInput.value = '';
        
        // 移除淡出效果，为下次显示做准备
        recipe.classList.remove('opacity-0');
        errorState.classList.remove('opacity-0');
        backButton.classList.remove('opacity-0');
      }, 300);
    });
  </script>
</body>
</html>
